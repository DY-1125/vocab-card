<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학습도구어 카드</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231D9E75'/%3E%3Crect x='7' y='8' width='12' height='16' rx='2' fill='white'/%3E%3Crect x='7' y='8' width='4' height='16' rx='2' fill='%230F6E56'/%3E%3Crect x='11' y='12' width='6' height='1.5' rx='1' fill='%231D9E75'/%3E%3Crect x='11' y='15' width='5' height='1.5' rx='1' fill='%231D9E75'/%3E%3Crect x='11' y='18' width='4' height='1.5' rx='1' fill='%231D9E75'/%3E%3Ccircle cx='22' cy='22' r='7' fill='%23085041'/%3E%3Ctext x='22' y='26' text-anchor='middle' font-size='9' font-weight='bold' fill='white' font-family='sans-serif'%3E가%3C/text%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo',sans-serif;background:#f5f5f3;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem;}
.wrap{width:100%;max-width:720px;}
.panel{background:#fff;border-radius:16px;border:1px solid rgba(0,0,0,0.08);padding:2rem;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
@media(max-width:600px){.panel{padding:1.25rem;}.wrap{max-width:100%;}}

/* 상단 */
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px;}
.app-title{font-size:15px;font-weight:600;color:#111;}
.pw{display:flex;align-items:center;gap:8px;}
.pb{width:90px;height:5px;background:#e5e5e5;border-radius:999px;overflow:hidden;}
.pf{height:100%;width:0%;background:#1D9E75;border-radius:999px;transition:width .3s;}
.pf.rv{background:#E24B4A;}
.pt{font-size:12px;color:#888;}

/* 탭 */
.tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap;}
.tab{font-size:12px;font-weight:500;padding:6px 14px;border-radius:999px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;transition:all .15s;}
.tab:hover{background:#f0f0f0;}
.tab.active{background:#E1F5EE;color:#085041;border-color:#5DCAA5;}
.tab.rv{border-color:#fca5a5;color:#A32D2D;}
.tab.rv.active{background:#FCEBEB;color:#A32D2D;border-color:#E24B4A;}

/* 통계 */
.stats{display:flex;gap:8px;margin-bottom:1.25rem;}
.sb{flex:1;background:#f8f8f7;border-radius:10px;padding:10px 8px;text-align:center;}
.sn{font-size:20px;font-weight:600;color:#111;}
.sn.g{color:#3B6D11;} .sn.r{color:#A32D2D;}
.sl{font-size:11px;color:#999;margin-top:2px;}

/* 배너 */
.banner{display:flex;align-items:center;justify-content:space-between;gap:8px;background:#FCEBEB;border-radius:10px;border:1px solid #fca5a5;padding:10px 14px;margin-bottom:1.25rem;}
.banner.hidden{display:none;}
.btxt{font-size:13px;color:#7f1d1d;font-weight:600;}
.bsub{font-size:11px;color:#A32D2D;margin-top:2px;}
.bstart{font-size:12px;font-weight:600;padding:6px 14px;border-radius:999px;border:none;background:#E24B4A;color:#fff;cursor:pointer;transition:opacity .15s;white-space:nowrap;}
.bstart:hover{opacity:.85;}

/* 모드 칩 */
.mode-wrap{margin-bottom:.75rem;}
.mchip{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#085041;background:#E1F5EE;border-radius:999px;padding:3px 10px;}
.mchip.rv{color:#A32D2D;background:#FCEBEB;}
.mdot{width:6px;height:6px;border-radius:50%;background:#1D9E75;flex-shrink:0;}
.mdot.rv{background:#E24B4A;}

/* 카드 씬 */
.scene{perspective:900px;height:240px;max-width:620px;margin:0 auto .75rem;}
@media(max-width:600px){.scene{height:210px;max-width:100%;}}
.c3d{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1);cursor:pointer;}
.c3d.fl{transform:rotateY(180deg);}
.face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  background:#fff;
  border:1px solid #e5e5e5;
  border-left:4px solid #1D9E75;
  border-radius:0 14px 14px 0;
  padding:1.1rem 1.1rem 1.1rem 1.2rem;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
.face.rv{border-left-color:#E24B4A;}
.bk{transform:rotateY(180deg);}

/* 도트 */
.dots-row{display:flex;gap:4px;margin-bottom:8px;}
.d{width:7px;height:7px;border-radius:50%;background:#e0e0e0;}
.d.on{background:#1D9E75;}
.d.on.rv{background:#E24B4A;}

/* 배지 */
.lv-pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 10px;border-radius:999px;margin-bottom:8px;}
.lv12{background:#E1F5EE;color:#085041;}
.lv34{background:#E6F1FB;color:#0C447C;}
.lv57{background:#FAEEDA;color:#633806;}
.lv-rv{background:#FCEBEB;color:#A32D2D;}

/* 앞면 */
.word{font-size:34px;font-weight:600;color:#111;line-height:1.1;margin-bottom:4px;}
.hint{font-size:11px;color:#bbb;}
.tap-lbl{position:absolute;bottom:12px;right:14px;font-size:11px;color:#ccc;background:#f5f5f5;border-radius:999px;padding:2px 9px;}

/* 뒷면 */
.def{font-size:13px;color:#222;line-height:1.6;margin-bottom:8px;}
.ex{font-size:12px;color:#666;border-left:3px solid #1D9E75;padding-left:8px;margin-bottom:10px;line-height:1.5;}
.ex.rv{border-left-color:#E24B4A;}
.fam-lbl{font-size:11px;font-weight:600;color:#999;margin-bottom:5px;}
.ftags{display:flex;flex-wrap:wrap;gap:4px;}
.ftag{font-size:11px;color:#085041;background:#E1F5EE;border-radius:999px;padding:2px 9px;border:1px solid #9FE1CB;cursor:pointer;transition:background .12s;}
.ftag:hover{background:#9FE1CB;}

/* 완료 박스 */
.donebox{background:#fff;border:1px solid #e5e5e5;border-left:4px solid #1D9E75;border-radius:0 14px 14px 0;padding:2rem 1.5rem;text-align:center;max-width:620px;margin:0 auto .75rem;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.donebox.rv{border-left-color:#E24B4A;}
.donebox.hidden{display:none;}
.done-t{font-size:26px;font-weight:700;color:#111;margin-bottom:6px;}
.done-s{font-size:13px;color:#888;margin-bottom:16px;}
.done-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}

/* 네비 버튼 */
.nav{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;}
.nb{font-size:13px;font-weight:600;padding:10px 26px;border-radius:999px;border:1px solid #ddd;background:#fff;color:#333;cursor:pointer;transition:all .15s;}
.nb:hover{background:#f0f0f0;}
.nb.kn{background:#E1F5EE;color:#085041;border-color:#5DCAA5;}
.nb.kn:hover{background:#9FE1CB;}
.nb.uk{background:#FCEBEB;color:#A32D2D;border-color:#fca5a5;}
.nb.uk:hover{background:#fecaca;}
.nb.skip{padding:10px 16px;color:#999;border-color:#eee;font-size:18px;line-height:1;}
.nb.skip:hover{background:#f5f5f5;color:#555;}
.ctr{font-size:13px;color:#aaa;min-width:48px;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
<div class="panel">

<div class="top-row">
  <span class="app-title">학습도구어 카드</span>
  <div class="pw">
    <div class="pb"><div class="pf" id="pf"></div></div>
    <span class="pt" id="pt">0/0</span>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchDeck(0)">Basic (Lv.1~2)</button>
  <button class="tab" onclick="switchDeck(1)">Middle (Lv.3~4)</button>
  <button class="tab" onclick="switchDeck(2)">Advanced (Lv.5~7)</button>
  <button class="tab rv" id="rtab" onclick="startReview()">복습 <span id="rbadge"></span></button>
</div>

<div class="stats">
  <div class="sb"><div class="sn g" id="kc">0</div><div class="sl">알아요</div></div>
  <div class="sb"><div class="sn r" id="uc">0</div><div class="sl">몰라요</div></div>
  <div class="sb"><div class="sn" id="lc">0</div><div class="sl">남은 카드</div></div>
</div>

<div class="banner hidden" id="banner">
  <div><div class="btxt" id="btxt"></div><div class="bsub">복습 탭에서 다시 학습하세요</div></div>
  <button class="bstart" onclick="startReview()">복습 시작</button>
</div>

<div class="mode-wrap">
  <span class="mchip" id="mchip">
    <span class="mdot" id="mdot"></span>
    <span id="mlabel">전체 학습</span>
  </span>
</div>

<div class="scene" id="scene">
  <div class="c3d" id="c3d">
    <div class="face" id="ffront">
      <div class="dots-row" id="dotsF"></div>
      <div class="lv-pill lv12" id="flv"></div>
      <div class="word" id="fw"></div>
      <div class="hint">클릭해서 뜻 확인</div>
      <div class="tap-lbl">tap</div>
    </div>
    <div class="face bk" id="fback">
      <div class="dots-row" id="dotsB"></div>
      <div class="lv-pill lv12" id="blv"></div>
      <div class="def" id="bdef"></div>
      <div class="ex" id="bex"></div>
      <div class="fam-lbl">단어족</div>
      <div class="ftags" id="ftags"></div>
    </div>
  </div>
</div>

<div class="donebox hidden" id="donebox">
  <div class="done-t" id="done-t">완료!</div>
  <div class="done-s" id="done-s"></div>
  <div class="done-btns">
    <button class="nb uk" id="retryBtn" style="display:none" onclick="startReview()">틀린 것만 다시</button>
    <button class="nb" onclick="restartDeck()">처음부터</button>
  </div>
</div>

<div class="nav" id="nav">
  <button class="nb skip" onclick="prevCard()" title="이전">&#8592;</button>
  <button class="nb uk" onclick="answer(false)">몰라요</button>
  <span class="ctr" id="ctr"></span>
  <button class="nb kn" onclick="answer(true)">알아요</button>
  <button class="nb skip" onclick="nextCard()" title="다음">&#8594;</button>
</div>

</div>
</div>

<script>
const RAW=[
  {word:'가능',lv:2,def:'어떤 일이 될 수 있거나 될 수 있는 상태.',ex:'"이 방법이 가능한지 먼저 확인해 보자."',fam:['가능성','가능하다']},
  {word:'가능성',lv:3,def:'어떤 일이 이루어질 수 있는 성질이나 정도.',ex:'"성공 가능성을 높이기 위해 전략을 세웠다."',fam:['가능','가능하다']},
  {word:'가설',lv:4,def:'아직 증명되지 않은 이론이나 명제.',ex:'"연구자는 가설을 세우고 실험으로 검증했다."',fam:[]},
  {word:'가정',lv:3,def:'사실인지 아닌지 분명하지 않은 것을 임시로 인정하는 것.',ex:'"이 논문은 특정 조건을 가정하고 분석한다."',fam:['가정되다','가정하다']},
  {word:'각오',lv:3,def:'앞으로 할 일에 대해 마음을 단단히 먹음.',ex:'"어떤 어려움이 와도 버티겠다는 각오를 다졌다."',fam:['각오하다']},
  {word:'갈등',lv:2,def:'개인이나 집단 사이의 의견·이익 충돌이나 심리적 대립.',ex:'"소설 속 인물들은 심한 갈등을 겪는다."',fam:[]},
  {word:'감각',lv:2,def:'외부 자극을 받아들이는 능력이나 그 느낌.',ex:'"뛰어난 언어 감각을 가진 작가다."',fam:['감각적']},
  {word:'감소',lv:3,def:'양이나 수가 줄어듦.',ex:'"인구 감소 문제가 심각하게 대두되고 있다."',fam:['감소되다','감소하다']},
  {word:'감시',lv:3,def:'어떤 대상을 지켜보며 통제하는 행위.',ex:'"권력에 대한 시민의 감시가 민주주의를 지킨다."',fam:['감시되다','감시하다']},
  {word:'개념',lv:3,def:'어떤 사물이나 현상에 대한 일반적인 지식이나 관념.',ex:'"이 글에서 핵심 개념을 파악하는 것이 중요하다."',fam:['개념적']},
  {word:'개발',lv:3,def:'새로운 것을 만들거나 자원을 활용하여 발전시킴.',ex:'"신제품 개발에 수년이 걸렸다."',fam:['개발되다','개발하다']},
  {word:'개방',lv:3,def:'닫혀 있던 것을 열거나 외부와 교류할 수 있게 함.',ex:'"시장 개방으로 다양한 상품이 들어왔다."',fam:['개방되다','개방성','개방적','개방하다']},
  {word:'개별',lv:4,def:'여럿 가운데 하나하나를 따로따로 구분하는 것.',ex:'"개별 학생의 수준에 맞춰 지도해야 한다."',fam:['개별성','개별적']},
  {word:'개선',lv:3,def:'나쁜 점이나 부족한 점을 고쳐 더 좋게 만들기.',ex:'"환경 개선을 위한 노력이 필요하다."',fam:['개선되다','개선하다']},
  {word:'개성',lv:2,def:'다른 사람이나 개체와 구별되는 고유한 특성.',ex:'"그의 작품에는 강한 개성이 드러난다."',fam:['개성적']},
  {word:'개요',lv:2,def:'전체 내용의 중요한 부분을 간략하게 정리한 것.',ex:'"발표 전에 개요를 작성해 두면 도움이 된다."',fam:[]},
  {word:'객관',lv:3,def:'개인의 감정이나 편견에 치우치지 않고 공정하게 사물을 보는 태도.',ex:'"사건을 객관적으로 판단해야 한다."',fam:['객관성','객관적','객관화']},
  {word:'건설',lv:2,def:'건물이나 시설을 새로 만들어 세움.',ex:'"새 도서관이 건설될 예정이다."',fam:['건설되다','건설적','건설하다']},
  {word:'검사',lv:2,def:'어떤 것이 옳은지 또는 이상이 없는지 살펴봄.',ex:'"실험 결과를 꼼꼼히 검사했다."',fam:['검사되다','검사하다']},
  {word:'결과',lv:1,def:'어떤 원인이나 행위로 인해 생겨난 최종 상태.',ex:'"실험의 결과를 표로 정리해 보자."',fam:['결과적']},
  {word:'결론',lv:2,def:'논의나 연구의 최종 판단이나 의견.',ex:'"긴 토론 끝에 결론을 도출했다."',fam:['결론적']},
  {word:'결정',lv:2,def:'행동이나 태도를 정하여 확실하게 함.',ex:'"진로를 결정하기 위해 여러 가지를 고려했다."',fam:['결정되다','결정적','결정하다']},
  {word:'경향',lv:3,def:'사물이나 현상이 일정한 방향으로 기울어지는 성질.',ex:'"요즘 소비자들은 건강을 중시하는 경향이 있다."',fam:[]},
  {word:'경험',lv:2,def:'실제로 겪거나 해봄으로써 얻은 지식이나 기능.',ex:'"다양한 경험이 사람을 성장시킨다."',fam:['경험적']},
  {word:'계획',lv:2,def:'앞으로 할 일의 절차나 방법 등을 미리 생각하여 정함.',ex:'"구체적인 계획을 세우고 실천에 옮겼다."',fam:['계획되다','계획성','계획적','계획하다']},
  {word:'고려',lv:3,def:'여러 가지 상황을 빠짐없이 생각하여 헤아려 봄.',ex:'"비용과 시간을 고려해서 결정을 내려야 한다."',fam:['고려되다','고려하다']},
  {word:'고유',lv:2,def:'본래부터 가지고 있는 특별한 것.',ex:'"우리 민족 고유의 문화를 지켜야 한다."',fam:['고유성','고유하다']},
  {word:'공개',lv:3,def:'내용이나 정보를 여러 사람에게 드러내어 보임.',ex:'"정부는 회의록을 공개하기로 결정했다."',fam:['공개되다','공개적','공개하다']},
  {word:'공급',lv:2,def:'필요한 것을 대어 줌.',ex:'"수요가 공급을 초과하면 가격이 오른다."',fam:['공급되다','공급하다']},
  {word:'공통',lv:2,def:'여럿 사이에 두루 해당하거나 관련됨.',ex:'"두 작품에는 공통된 주제가 있다."',fam:['공통되다','공통성','공통적','공통점']},
  {word:'관계',lv:1,def:'둘 이상의 사람이나 사물이 서로 관련을 맺고 있는 상태.',ex:'"두 사건 사이의 관계를 분석하라."',fam:['관계되다','관계하다']},
  {word:'관련',lv:2,def:'둘 이상의 사람이나 사물이 서로 연결되어 있음.',ex:'"이 사건과 관련된 증거를 수집했다."',fam:['관련되다','관련성','관련하다']},
  {word:'관점',lv:2,def:'사물이나 현상을 관찰하고 생각하는 입장이나 태도.',ex:'"다양한 관점에서 문제를 바라봐야 한다."',fam:[]},
  {word:'관찰',lv:2,def:'사물이나 현상을 주의 깊게 살펴봄.',ex:'"과학자는 자연 현상을 꾸준히 관찰했다."',fam:['관찰되다','관찰하다']},

  {word:'형성',lv:3,def:'어떤 형태나 상태가 이루어짐.',ex:'"좋은 습관은 반복을 통해 형성된다."',fam:['형성되다','형성하다']},
  {word:'확인',lv:3,def:'틀림없음을 살펴 알아봄.',ex:'"결과를 꼼꼼히 확인하는 습관이 중요하다."',fam:['확인되다','확인하다']},
  {word:'활용',lv:3,def:'충분히 잘 이용함.',ex:'"배운 지식을 실생활에 활용해 보세요."',fam:['활용되다','활용하다']},
  {word:'효과',lv:2,def:'어떤 행동이나 현상으로 인해 나타나는 긍정적인 결과.',ex:'"이 방법이 효과적임을 실험으로 입증했다."',fam:['효과적']},
  {word:'개연성',lv:5,def:'어떤 일이 일어날 수 있을 만한 가능성의 정도.',ex:'"이 소설의 사건 전개는 개연성이 부족하다."',fam:['개연']},
  {word:'가변성',lv:5,def:'상황에 따라 바뀔 수 있는 성질.',ex:'"언어는 시대에 따라 가변성을 가진다."',fam:['가변','가변적']},
  {word:'귀결',lv:4,def:'결국 어떤 결론이나 상태에 다다름.',ex:'"논의는 결국 하나의 결론으로 귀결되었다."',fam:['귀결되다','귀결하다']},
  {word:'내재',lv:5,def:'어떤 사물이나 현상 안에 본래부터 들어 있음.',ex:'"이 작품에는 사회 비판 의식이 내재되어 있다."',fam:['내재되다','내재성','내재적','내재하다']},
  {word:'잠재',lv:5,def:'겉으로 드러나지 않고 내면에 숨어 있음.',ex:'"그는 잠재된 능력을 발휘하기 시작했다."',fam:['잠재력','잠재성','잠재적']},
  {word:'추상',lv:4,def:'구체적 대상에서 공통 속성을 뽑아 일반 개념을 만듦.',ex:'"자유는 추상적인 개념이다."',fam:['추상적','추상화되다','추상화하다']},
  {word:'함의',lv:5,def:'말이나 글 속에 직접 표현되지 않은 숨겨진 의미.',ex:'"이 문장의 함의를 파악하는 것이 중요하다."',fam:[]},
  {word:'규명',lv:5,def:'어떤 사실이나 원인을 밝혀 확실하게 함.',ex:'"사건의 원인을 규명하기 위해 조사를 벌였다."',fam:['규명되다','규명하다']},
  {word:'도출',lv:5,def:'판단이나 결론 등을 이끌어냄.',ex:'"실험 데이터에서 결론을 도출했다."',fam:['도출되다','도출하다']},
  {word:'통찰',lv:5,def:'예리하게 꿰뚫어 봄. 깊은 이해와 통찰력.',ex:'"뛰어난 통찰력으로 문제의 본질을 파악했다."',fam:['통찰력','통찰하다']},
  {word:'보편',lv:4,def:'모든 것에 두루 해당하는 것.',ex:'"보편적인 원리를 특수한 상황에 적용했다."',fam:['보편성','보편적','보편화']},
  {word:'수렴',lv:5,def:'여러 의견이나 방향이 하나로 모임.',ex:'"다양한 의견이 하나의 결론으로 수렴되었다."',fam:['수렴되다','수렴하다']},
  {word:'타당',lv:3,def:'사리에 맞고 옳음.',ex:'"타당한 근거를 제시해야 설득력이 생긴다."',fam:['타당성','타당하다']},
  {word:'추세',lv:4,def:'어떤 현상이 일정한 방향으로 나아가는 경향.',ex:'"최근의 추세를 반영한 정책이 필요하다."',fam:[]},
  {word:'층위',lv:5,def:'같은 종류의 것들이 쌓여 있는 단계나 수준.',ex:'"언어는 다양한 층위에서 분석할 수 있다."',fam:[]},
];

const DECKS=[
  {cards:RAW.filter(c=>c.lv<=2)},
  {cards:RAW.filter(c=>c.lv===3||c.lv===4)},
  {cards:RAW.filter(c=>c.lv>=5)},
];

let deckIdx=0,pool=[],cur=0,flipped=false;
let knowSet=new Set(),unknSet=new Set(),isRev=false,revPool=[];

function lvPill(lv,rv){
  if(rv)return'lv-pill lv-rv';
  return lv<=2?'lv-pill lv12':lv<=4?'lv-pill lv34':'lv-pill lv57';
}
function lvTxt(lv,rv){
  const t=lv<=2?'Basic Lv.'+lv:lv<=4?'Middle Lv.'+lv:'Adv Lv.'+lv;
  return rv?'복습 '+t:t;
}
function makeDots(lv,rv,elId){
  const el=document.getElementById(elId);
  el.innerHTML='';
  for(let i=1;i<=7;i++){
    const d=document.createElement('div');
    d.className='d'+(i<=lv?' on'+(rv?' rv':''):'');
    el.appendChild(d);
  }
}
function getPool(){return isRev?revPool:pool;}
function setRevStyle(on){
  document.getElementById('ffront').classList.toggle('rv',on);
  document.getElementById('fback').classList.toggle('rv',on);
  document.getElementById('bex').classList.toggle('rv',on);
  document.getElementById('pf').classList.toggle('rv',on);
  const chip=document.getElementById('mchip');
  const dot=document.getElementById('mdot');
  const lbl=document.getElementById('mlabel');
  if(on){chip.className='mchip rv';dot.className='mdot rv';lbl.textContent='복습 모드 — 몰랐던 단어';}
  else{chip.className='mchip';dot.className='mdot';lbl.textContent='전체 학습';}
}
function showCard(){
  const p=getPool();
  if(cur>=p.length){showDone();return;}
  const c=p[cur];
  document.getElementById('scene').style.display='block';
  document.getElementById('donebox').classList.add('hidden');
  document.getElementById('nav').style.display='flex';
  const pc=lvPill(c.lv,isRev),tx=lvTxt(c.lv,isRev);
  const flv=document.getElementById('flv');flv.className=pc;flv.textContent=tx;
  const blv=document.getElementById('blv');blv.className=pc;blv.textContent=tx;
  document.getElementById('fw').textContent=c.word;
  document.getElementById('bdef').textContent=c.def;
  document.getElementById('bex').textContent=c.ex;
  makeDots(c.lv,isRev,'dotsF');
  makeDots(c.lv,isRev,'dotsB');
  const ft=document.getElementById('ftags');ft.innerHTML='';
  if(!c.fam||c.fam.length===0){
    ft.innerHTML='<span style="font-size:11px;color:#bbb;">단독 단어</span>';
  } else {
    c.fam.forEach(f=>{const t=document.createElement('span');t.className='ftag';t.textContent=f;ft.appendChild(t);});
  }
  document.getElementById('ctr').textContent=(cur+1)+'/'+p.length;
  updateStats();unflip();
}
function showDone(){
  const p=getPool();
  document.getElementById('scene').style.display='none';
  document.getElementById('nav').style.display='none';
  const db=document.getElementById('donebox');
  db.classList.remove('hidden');
  db.classList.toggle('rv',isRev);
  document.getElementById('done-t').textContent=isRev?'복습 완료!':'완료!';
  document.getElementById('done-s').textContent='알아요 '+knowSet.size+'개 · 몰라요 '+unknSet.size+'개';
  document.getElementById('retryBtn').style.display=unknSet.size>0?'inline-block':'none';
  document.getElementById('pf').style.width='100%';
  document.getElementById('pt').textContent=p.length+'/'+p.length;
  document.getElementById('lc').textContent='0';
  updateBadge();
}
function updateStats(){
  const p=getPool();
  document.getElementById('kc').textContent=knowSet.size;
  document.getElementById('uc').textContent=unknSet.size;
  document.getElementById('lc').textContent=Math.max(0,p.length-cur);
  const pct=p.length>0?Math.round(cur/p.length*100):0;
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pt').textContent=cur+'/'+p.length;
  updateBadge();
}
function updateBadge(){
  const n=unknSet.size;
  document.getElementById('rbadge').textContent=n>0?'('+n+')':'';
  const bn=document.getElementById('banner');
  if(n>0&&!isRev){bn.classList.remove('hidden');document.getElementById('btxt').textContent='몰랐던 단어 '+n+'개가 있어요';}
  else bn.classList.add('hidden');
}
function unflip(){flipped=false;document.getElementById('c3d').classList.remove('fl');}
function flipCard(){flipped=!flipped;document.getElementById('c3d').classList.toggle('fl',flipped);}
function prevCard(){
  if(cur<=0)return;
  cur--;showCard();
}
function nextCard(){
  const p=getPool();
  if(cur>=p.length-1)return;
  cur++;showCard();
}
function answer(know){
  const p=getPool();if(cur>=p.length)return;
  const w=p[cur].word;
  if(know){knowSet.add(w);unknSet.delete(w);}
  else{unknSet.add(w);knowSet.delete(w);}
  cur++;showCard();
}
function startReview(){
  if(unknSet.size===0)return;
  revPool=RAW.filter(c=>unknSet.has(c.word));
  isRev=true;cur=0;knowSet.clear();unknSet.clear();
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('rtab').classList.add('active');
  setRevStyle(true);
  document.getElementById('scene').style.display='block';
  document.getElementById('donebox').classList.add('hidden');
  document.getElementById('nav').style.display='flex';
  showCard();
}
function restartDeck(){
  isRev=false;cur=0;knowSet.clear();unknSet.clear();
  pool=DECKS[deckIdx].cards;
  setRevStyle(false);
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===deckIdx));
  document.getElementById('rtab').classList.remove('active');
  document.getElementById('scene').style.display='block';
  document.getElementById('donebox').classList.add('hidden');
  document.getElementById('nav').style.display='flex';
  showCard();
}
function switchDeck(idx){
  if(isRev){isRev=false;setRevStyle(false);}
  deckIdx=idx;pool=DECKS[idx].cards;
  cur=0;knowSet.clear();unknSet.clear();
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.getElementById('rtab').classList.remove('active');
  document.getElementById('scene').style.display='block';
  document.getElementById('donebox').classList.add('hidden');
  document.getElementById('nav').style.display='flex';
  showCard();
}
document.getElementById('c3d').addEventListener('click',flipCard);
switchDeck(0);
</script>
